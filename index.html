<!DOCTYPE html>
<html>
<head>
    <title>ManaMart</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin:0;
            background:#f5f5f5;
        }

        .header{
            background:#2e7d32;
            color:white;
            padding:20px;
            text-align:center;
        }

        .hero{
            text-align:center;
            padding:50px;
        }

        .btn{
            background:#2e7d32;
            color:white;
            padding:12px 25px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }

        .products{
            display:flex;
            justify-content:center;
            gap:20px;
            margin-top:30px;
        }

        .card{
            background:white;
            width:200px;
            padding:15px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
            text-align:center;
        }
    </style>

</head>

<body>

<div class="header">
    <h1>ManaMart</h1>
    <p>From Our Store to Your Door.</p>

    <br>

    <button class="btn">Home</button>
    <button class="btn">Products</button>
    <button class="btn">Cart (<span id="cartCount">0</span>)</button>
    <button class="btn">Login</button>
</div>

<div class="hero">

    <h2>Welcome to ManaMart</h2>

    <p>Order groceries online and get them delivered to your home.</p>

    <button class="btn">Shop Now</button>

    <div class="products">

        <div class="card">
            <h3>Rice</h3>
            <p>₹60 / Kg</p>
            <button class="btn" onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Sugar</h3>
            <p>₹45 / Kg</p>
           <button class="btn" onclick="addToCart()">Add to Cart</button>
        </div>

        <div class="card">
            <h3>Groundnuts</h3>
            <p>₹80 / Kg</p>
            <button class="btn" onclick="addToCart()">Add to Cart</button>
        </div>

    </div>

</div>
<script>
let cartCount = 0;

function addToCart() {
    cartCount++;
    document.getElementById("cartCount").innerText = cartCount;
}
</script>
</body>
</html>
