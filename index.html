<!DOCTYPE html>
<html>
<head>
<title>ManaMart</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f5f5f5;
}

.header{
    background:#2e7d32;
    color:white;
    padding:20px;
    text-align:center;
}

.btn{
    background:#2e7d32;
    color:white;
    padding:10px 20px;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.hero{
    text-align:center;
    padding:40px;
}

.products{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    width:220px;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<div class="header">
<h1>ManaMart</h1>
<p>From Our Store To Your Door</p>

<button class="btn">Home</button>

<button class="btn" onclick="window.location.href='cart.html'">
Cart (<span id="cartCount">0</span>)
</button>

</div>

<div class="hero">

<h2>Welcome To ManaMart</h2>

<div class="products">

<div class="card">
<h3>Rice</h3>
<p>₹60 / Kg</p>
<button class="btn" onclick="addToCart('Rice',60)">
Add To Cart
</button>
</div>

<div class="card">
<h3>Sugar</h3>
<p>₹45 / Kg</p>
<button class="btn" onclick="addToCart('Sugar',45)">
Add To Cart
</button>
</div>

<div class="card">
<h3>Groundnuts</h3>
<p>₹80 / Kg</p>
<button class="btn" onclick="addToCart('Groundnuts',80)">
Add To Cart
</button>
</div>

</div>
</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

document.getElementById("cartCount").innerText = cart.length;

function addToCart(product,price){

cart.push({
product:product,
price:price
});

localStorage.setItem("cart",JSON.stringify(cart));

document.getElementById("cartCount").innerText = cart.length;

alert(product + " Added To Cart");

}

</script>

</body>
</html>
