<!DOCTYPE html>
<html>
<head>
<title>Cart</title>

<style>

body{
font-family:Arial;
padding:30px;
background:#f5f5f5;
}

.box{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
margin:auto;
}

button{
background:#2e7d32;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="box">

<h2>Your Cart</h2>

<div id="cartItems"></div>

<h3>Total : ₹<span id="total">0</span></h3>

<button onclick="window.location.href='checkout.html'">
Proceed To Checkout
</button>

</div>

<script>

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let total = 0;
let output = "";

cart.forEach(item=>{

output += "<p>"+item.product+" - ₹"+item.price+"</p>";

total += item.price;

});

document.getElementById("cartItems").innerHTML = output;
document.getElementById("total").innerText = total;

</script>

</body>
</html>
