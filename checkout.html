<!DOCTYPE html>
<html>
<head>

<title>Checkout</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.container{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
}

button{
background:#2e7d32;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h2>Customer Details</h2>

<input type="text" placeholder="Full Name">

<input type="tel" placeholder="Mobile Number">

<textarea rows="4" placeholder="Delivery Address"></textarea>

<button onclick="placeOrder()">
Place Order
</button>

</div>

<script>

function placeOrder(){

window.location.href="payment.html";

}

</script>

</body>
</html>
