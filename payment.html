<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
}

.box{
width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:10px;
text-align:center;
}

button{
background:#2e7d32;
color:white;
padding:10px 20px;
border:none;
border-radius:5px;
cursor:pointer;
display:block;
width:100%;
margin-top:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>Select Payment Method</h2>

<button onclick="pay()">
UPI Payment
</button>

<button onclick="pay()">
Cash On Delivery
</button>

</div>

<script>

function pay(){

alert("Payment Successful!");

localStorage.removeItem("cart");

window.location.href="index.html";

}

</script>

</body>
</html>
