<!DOCTYPE html>
<html>
<head>
    <title>Payment - ManaMart</title>
    <style>
        body{
            font-family:Arial;
            text-align:center;
            background:#f4f4f4;
            padding:50px;
        }

        .box{
            background:white;
            width:400px;
            margin:auto;
            padding:30px;
            border-radius:10px;
        }

        button{
            background:green;
            color:white;
            border:none;
            padding:12px 25px;
            margin:10px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Select Payment Method</h2>

    <button onclick="pay()">UPI Payment</button>
    <button onclick="pay()">Cash on Delivery</button>

</div>

<script>
function pay(){
    alert("Payment Successful!");
}
</script>

</body>
</html>
